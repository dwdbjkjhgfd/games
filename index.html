<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Menu</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #101014;
      color: white;
      overflow: hidden;
    }

    #menu {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 20px;
      background: linear-gradient(135deg, #121212, #202040);
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    button {
      width: 260px;
      padding: 16px;
      font-size: 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: white;
      color: black;
      font-weight: bold;
    }

    button:hover {
      background: #00d9ff;
    }

    #gameArea {
      display: none;
      position: relative;
      width: 100vw;
      height: 100vh;
      background: black;
    }

    #backButton {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      width: auto;
      padding: 10px 16px;
      font-size: 16px;
    }

    #info {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      font-size: 20px;
      color: white;
    }

    #crosshair {
      display: none;
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 10;
      transform: translate(-50%, -50%);
      font-size: 32px;
      pointer-events: none;
    }

    canvas {
      display: block;
      margin: auto;
      background: #000;
    }
  </style>
</head>
<body>

  <div id="menu">
    <h1>Game Menu</h1>
    <button onclick="startPingPong()">1. Ping Pong Game</button>
    <button onclick="startBrickBreaker()">2. Brick Breaker Game</button>
    <button onclick="startShooter()">3. Shooter Game</button>
  </div>

  <div id="gameArea">
    <div id="info"></div>
    <div id="crosshair">+</div>
    <button id="backButton" onclick="goBack()">Back to Menu</button>
    <canvas id="canvas"></canvas>
  </div>

<script>
const menu = document.getElementById("menu");
const gameArea = document.getElementById("gameArea");
const info = document.getElementById("info");
const crosshair = document.getElementById("crosshair");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let currentGame = "";
let animationId;
let keys = {};

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

function showGame(name) {
  currentGame = name;
  menu.style.display = "none";
  gameArea.style.display = "block";
  crosshair.style.display = "none";
  info.textContent = "";
  keys = {};

  if (animationId) cancelAnimationFrame(animationId);
}

function goBack() {
  if (animationId) cancelAnimationFrame(animationId);
  currentGame = "";
  gameArea.style.display = "none";
  menu.style.display = "flex";
  crosshair.style.display = "none";
  info.textContent = "";
}

/* =====================
   1. PING PONG GAME
===================== */
function startPingPong() {
  showGame("pong");

  canvas.width = 800;
  canvas.height = 500;

  const paddleWidth = 10;
  const paddleHeight = 100;

  let playerY = canvas.height / 2 - paddleHeight / 2;
  let aiY = canvas.height / 2 - paddleHeight / 2;

  let ballX = canvas.width / 2;
  let ballY = canvas.height / 2;
  let ballRadius = 8;
  let ballSpeedX = 5;
  let ballSpeedY = 3;

  let playerScore = 0;
  let aiScore = 0;

  canvas.onmousemove = function(evt) {
    const rect = canvas.getBoundingClientRect();
    playerY = evt.clientY - rect.top - paddleHeight / 2;
  };

  function loop() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "white";
    ctx.font = "22px Arial";
    ctx.fillText(playerScore, canvas.width / 2 - 50, 30);
    ctx.fillText(aiScore, canvas.width / 2 + 35, 30);

    ctx.fillRect(0, playerY, paddleWidth, paddleHeight);
    ctx.fillRect(canvas.width - paddleWidth, aiY, paddleWidth, paddleHeight);

    ctx.beginPath();
    ctx.arc(ballX, ballY, ballRadius, 0, Math.PI * 2);
    ctx.fill();

    ballX += ballSpeedX;
    ballY += ballSpeedY;

    if (ballY + ballRadius > canvas.height || ballY - ballRadius < 0) {
      ballSpeedY *= -1;
    }

    if (
      ballX - ballRadius < paddleWidth &&
      ballY > playerY &&
      ballY < playerY + paddleHeight
    ) {
      ballSpeedX *= -1;
    }

    if (
      ballX + ballRadius > canvas.width - paddleWidth &&
      ballY > aiY &&
      ballY < aiY + paddleHeight
    ) {
      ballSpeedX *= -1;
    }

    if (ballX < 0) {
      aiScore++;
      resetBall();
    }

    if (ballX > canvas.width) {
      playerScore++;
      resetBall();
    }

    function resetBall() {
      ballX = canvas.width / 2;
      ballY = canvas.height / 2;
      ballSpeedX *= -1;
    }

    aiY += (ballY - (aiY + paddleHeight / 2)) * 0.08;

    animationId = requestAnimationFrame(loop);
  }

  loop();
}

/* =====================
   2. BRICK BREAKER GAME
===================== */
function startBrickBreaker() {
  showGame("brick");

  canvas.width = 800;
  canvas.height = 500;

  let score = 0;
  let lives = 3;

  const paddle = {
    width: 110,
    height: 15,
    x: canvas.width / 2 - 55,
    y: canvas.height - 35,
    speed: 8,
    dx: 0
  };

  const ball = {
    x: canvas.width / 2,
    y: canvas.height - 60,
    radius: 8,
    dx: 4,
    dy: -4
  };

  const brickRowCount = 5;
  const brickColumnCount = 9;
  const brickWidth = 75;
  const brickHeight = 22;
  const brickPadding = 10;
  const brickOffsetTop = 50;
  const brickOffsetLeft = 25;

  let bricks = [];

  for (let r = 0; r < brickRowCount; r++) {
    bricks[r] = [];
    for (let c = 0; c < brickColumnCount; c++) {
      bricks[r][c] = { x: 0, y: 0, visible: true };
    }
  }

  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    paddle.dx = 0;
    if (keys["arrowright"] || keys["d"]) paddle.dx = paddle.speed;
    if (keys["arrowleft"] || keys["a"]) paddle.dx = -paddle.speed;

    paddle.x += paddle.dx;
    if (paddle.x < 0) paddle.x = 0;
    if (paddle.x + paddle.width > canvas.width) {
      paddle.x = canvas.width - paddle.width;
    }

    ctx.fillStyle = "white";
    ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);

    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
    ctx.fill();

    for (let r = 0; r < brickRowCount; r++) {
      for (let c = 0; c < brickColumnCount; c++) {
        const brick = bricks[r][c];

        if (brick.visible) {
          const brickX = c * (brickWidth + brickPadding) + brickOffsetLeft;
          const brickY = r * (brickHeight + brickPadding) + brickOffsetTop;
          brick.x = brickX;
          brick.y = brickY;

          ctx.fillStyle = `hsl(${r * 60}, 80%, 55%)`;
          ctx.fillRect(brickX, brickY, brickWidth, brickHeight);

          if (
            ball.x > brick.x &&
            ball.x < brick.x + brickWidth &&
            ball.y > brick.y &&
            ball.y < brick.y + brickHeight
          ) {
            ball.dy *= -1;
            brick.visible = false;
            score++;

            if (score === brickRowCount * brickColumnCount) {
              alert("You win!");
              startBrickBreaker();
              return;
            }
          }
        }
      }
    }

    ball.x += ball.dx;
    ball.y += ball.dy;

    if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) {
      ball.dx *= -1;
    }

    if (ball.y - ball.radius < 0) {
      ball.dy *= -1;
    }

    if (
      ball.x > paddle.x &&
      ball.x < paddle.x + paddle.width &&
      ball.y + ball.radius > paddle.y
    ) {
      ball.dy *= -1;
    }

    if (ball.y + ball.radius > canvas.height) {
      lives--;

      if (lives <= 0) {
        alert("Game Over! Score: " + score);
        startBrickBreaker();
        return;
      } else {
        ball.x = canvas.width / 2;
        ball.y = canvas.height - 60;
        ball.dx = 4;
        ball.dy = -4;
      }
    }

    ctx.fillStyle = "white";
    ctx.font = "18px Arial";
    ctx.fillText("Score: " + score, 20, 25);
    ctx.fillText("Lives: " + lives, canvas.width - 90, 25);

    animationId = requestAnimationFrame(loop);
  }

  loop();
}

/* =====================
   3. SHOOTER GAME
===================== */
function startShooter() {
  showGame("shooter");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  crosshair.style.display = "block";

  let score = 0;

  let player = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    speed: 5
  };

  let targets = [];

  function createTarget() {
    targets.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: 40
    });
  }

  for (let i = 0; i < 6; i++) createTarget();

  canvas.onclick = function() {
    const crossX = canvas.width / 2;
    const crossY = canvas.height / 2;

    for (let target of targets) {
      const screenX = target.x - player.x + canvas.width / 2;
      const screenY = target.y - player.y + canvas.height / 2;
      const dx = crossX - screenX;
      const dy = crossY - screenY;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance < target.size) {
        target.x = Math.random() * canvas.width;
        target.y = Math.random() * canvas.height;
        score++;
        break;
      }
    }
  };

  function loop() {
    if (keys["w"]) player.y -= player.speed;
    if (keys["s"]) player.y += player.speed;
    if (keys["a"]) player.x -= player.speed;
    if (keys["d"]) player.x += player.speed;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#4a90e2";
    ctx.fillRect(0, 0, canvas.width, canvas.height / 2);

    ctx.fillStyle = "#333";
    ctx.fillRect(0, canvas.height / 2, canvas.width, canvas.height / 2);

    for (let target of targets) {
      const screenX = target.x - player.x + canvas.width / 2;
      const screenY = target.y - player.y + canvas.height / 2;

      ctx.beginPath();
      ctx.arc(screenX, screenY, target.size, 0, Math.PI * 2);
      ctx.fillStyle = "red";
      ctx.fill();

      ctx.beginPath();
      ctx.arc(screenX, screenY, target.size / 2, 0, Math.PI * 2);
      ctx.fillStyle = "white";
      ctx.fill();
    }

    ctx.fillStyle = "#555";
    ctx.fillRect(canvas.width / 2 + 40, canvas.height - 120, 90, 35);

    ctx.fillStyle = "#222";
    ctx.fillRect(canvas.width / 2 + 110, canvas.height - 112, 70, 18);

    info.textContent = "Score: " + score + " | WASD to move | Click to shoot";

    animationId = requestAnimationFrame(loop);
  }

  loop();
}
</script>

</body>
</html>
