<!DOCTYPE html>
<html>
<head>
  <title>Mini FPS Game</title>
  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
      background: #222;
    }

    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-size: 20px;
    }

    #crosshair {
      position: absolute;
      left: 50%;
      top: 50%;
      color: white;
      font-size: 30px;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="info">Score: 0 | Click targets!</div>
<div id="crosshair">+</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const info = document.getElementById("info");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
let player = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  speed: 5
};

let keys = {};
let targets = [];

function createTarget() {
  targets.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: 40,
    alive: true
  });
}

for (let i = 0; i < 6; i++) {
  createTarget();
}

document.addEventListener("keydown", e => {
  keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e => {
  keys[e.key.toLowerCase()] = false;
});

canvas.addEventListener("click", () => {
  const crossX = canvas.width / 2;
  const crossY = canvas.height / 2;

  for (let target of targets) {
    const dx = crossX - target.x;
    const dy = crossY - target.y;
    const distance = Math.sqrt(dx * dx + dy * dy);

    if (distance < target.size) {
      target.x = Math.random() * canvas.width;
      target.y = Math.random() * canvas.height;
      score++;
      info.textContent = "Score: " + score + " | Click targets!";
      break;
    }
  }
});

function movePlayer() {
  if (keys["w"]) player.y -= player.speed;
  if (keys["s"]) player.y += player.speed;
  if (keys["a"]) player.x -= player.speed;
  if (keys["d"]) player.x += player.speed;
}

function drawBackground() {
  // Sky
  ctx.fillStyle = "#4a90e2";
  ctx.fillRect(0, 0, canvas.width, canvas.height / 2);

  // Ground
  ctx.fillStyle = "#333";
  ctx.fillRect(0, canvas.height / 2, canvas.width, canvas.height / 2);

  // Simple wall lines
  ctx.strokeStyle = "#555";
  for (let i = 0; i < canvas.width; i += 80) {
    ctx.beginPath();
    ctx.moveTo(i, canvas.height / 2);
    ctx.lineTo(i - player.x % 80, canvas.height);
    ctx.stroke();
  }
}

function drawTargets() {
  for (let target of targets) {
    ctx.beginPath();
    ctx.arc(target.x - player.x + canvas.width / 2, target.y - player.y + canvas.height / 2, target.size, 0, Math.PI * 2);
    ctx.fillStyle = "red";
    ctx.fill();

    ctx.beginPath();
    ctx.arc(target.x - player.x + canvas.width / 2, target.y - player.y + canvas.height / 2, target.size / 2, 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();
  }
}

function drawGun() {
  ctx.fillStyle = "#555";
  ctx.fillRect(canvas.width / 2 + 40, canvas.height - 120, 90, 35);

  ctx.fillStyle = "#222";
  ctx.fillRect(canvas.width / 2 + 110, canvas.height - 112, 70, 18);
}

function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  movePlayer();
  drawBackground();
  drawTargets();
  drawGun();

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
